power_cycle:
  target:
    entity:
      domain:
        - light
        - switch
    device: {}
  fields:
    power_cycle_delay:
      selector:
        number:
          min: 0.1
          max: 60.0
          step: 0.1
          unit_of_measurement: "s"
          mode: box

factory_reset:
  target:
    entity:
      domain:
        - light
        - switch
    device: {}
  fields:
    toggle_count:
      selector:
        number:
          min: 1
          max: 20
          step: 1
          mode: box
    off_duration:
      selector:
        number:
          min: 0.1
          max: 30.0
          step: 0.1
          unit_of_measurement: "s"
          mode: box
    on_duration:
      selector:
        number:
          min: 0.1
          max: 30.0
          step: 0.1
          unit_of_measurement: "s"
          mode: box
