power_cycle:
  target:
    entity:
      domain:
        - light
        - switch
    device: {}
  fields:
    power_cycle_delay:
      selector:
        number:
          min: 0.1
          max: 60.0
          step: 0.1
          unit_of_measurement: "s"
          mode: box

factory_reset:
  target:
    entity:
      domain:
        - light
        - switch
    device: {}
  fields:
    toggle_count:
      selector:
        number:
          min: 1
          max: 20
          step: 1
          mode: box
    off_duration:
      selector:
        number:
          min: 0.1
          max: 30.0
          step: 0.1
          unit_of_measurement: "s"
          mode: box
    on_duration:
      selector:
        number:
          min: 0.1
          max: 30.0
          step: 0.1
          unit_of_measurement: "s"
          mode: box

turn_on:
  target:
    entity:
      domain:
        - light
        - switch
    device: {}
  fields:
    brightness_pct:
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider
    color_temp_kelvin:
      selector:
        number:
          min: 1000
          max: 10000
          step: 100
          unit_of_measurement: "K"
          mode: box

turn_off:
  target:
    entity:
      domain:
        - light
        - switch
    device: {}

toggle:
  target:
    entity:
      domain:
        - light
        - switch
    device: {}
  fields:
    brightness_pct:
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider
    color_temp_kelvin:
      selector:
        number:
          min: 1000
          max: 10000
          step: 100
          unit_of_measurement: "K"
          mode: box

make_all_dumb: {}

make_all_smart: {}
